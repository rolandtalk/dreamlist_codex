services:
  redis:
    image: redis:7-alpine
    container_name: dreamlist-redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: dreamlist-web
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    container_name: dreamlist-worker
    command: celery -A app.celery_app:celery_app worker --loglevel=INFO
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
